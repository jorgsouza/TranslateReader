name: TranslateReader
options:
  bundleIdPrefix: com.translatereader
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: TranslateReader
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  TranslateReader:
    type: application
    platform: macOS
    sources:
      - path: TranslateReaderApp.swift
      - path: Models
      - path: Views
      - path: Services
      - path: Utils
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: TranslateReader.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.translatereader.app
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
    entitlements:
      path: TranslateReader.entitlements
