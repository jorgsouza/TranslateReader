name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: List available Xcode versions
      run: ls -la /Applications | grep Xcode || true

    - name: Select Xcode version
      run: |
        # Try Xcode 16 first (has Translation framework), fallback to latest available
        if [ -d "/Applications/Xcode_16.2.app" ]; then
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        elif [ -d "/Applications/Xcode_16.1.app" ]; then
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
        elif [ -d "/Applications/Xcode_16.0.app" ]; then
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
        elif [ -d "/Applications/Xcode.app" ]; then
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        fi

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Build app
      run: |
        xcodebuild -project TranslateReader.xcodeproj \
          -scheme TranslateReader \
          -configuration Release \
          -derivedDataPath build \
          -arch arm64 \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          build

    - name: Create DMG
      run: |
        # Create staging directory
        mkdir -p dmg-staging
        cp -R build/Build/Products/Release/TranslateReader.app dmg-staging/
        
        # Create symlink to Applications
        ln -s /Applications dmg-staging/Applications
        
        # Create DMG
        hdiutil create -volname "TranslateReader" \
          -srcfolder dmg-staging \
          -ov -format UDZO \
          TranslateReader.dmg

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: TranslateReader-macOS
        path: TranslateReader.dmg
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: TranslateReader-macOS

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: TranslateReader.dmg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
